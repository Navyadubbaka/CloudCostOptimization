name: AWS Lambda Deployment Pipeline

# Trigger the workflow on push to main and pull requests
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# Environment variables for the pipeline
env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: CloudCostOptimizer
  PYTHON_VERSION: "3.11"

jobs:
  # Job 1: Code quality checks and testing
  test:
    name: Test and Lint Code
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Cache pip dependencies to speed up workflow
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytest pylint
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Run code quality checks with pylint
      - name: Lint with pylint
        run: pylint code.txt --disable=C0111 || true

      # Run unit tests (if tests exist)
      - name: Run tests
        run: |
          if [ -f test_code.py ]; then pytest test_code.py -v; fi

  # Job 2: Deploy to AWS Lambda (only on push to main)
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Configure AWS credentials using GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Install dependencies for Lambda
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -t ./lambda_package/

      # Copy Lambda function code to package directory
      - name: Prepare Lambda package
        run: |
          mkdir -p lambda_package
          cp code.txt lambda_package/lambda_function.py

      # Create deployment package (zip file)
      - name: Create deployment package
        run: |
          cd lambda_package
          zip -r ../function.zip .
          cd ..

      # Upload function code to AWS Lambda
      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://function.zip \
            --region ${{ env.AWS_REGION }}

      # Wait for Lambda update to complete
      - name: Wait for Lambda update
        run: |
          sleep 10
          aws lambda get-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --region ${{ env.AWS_REGION }}

      # Log deployment success
      - name: Deployment successful
        run: echo "✅ Lambda function ${{ env.LAMBDA_FUNCTION_NAME }} deployed successfully!"

  # Job 3: Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install security scanning tools
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      # Scan for security vulnerabilities with Bandit
      - name: Security scan with Bandit
        run: |
          bandit -r . -ll || true

      # Check for known vulnerabilities in dependencies
      - name: Check dependencies with Safety
        run: |
          if [ -f requirements.txt ]; then safety check -r requirements.txt || true; fi

  # Job 4: Notify on deployment
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment completed successfully!"
          else
            echo "⚠️ Deployment completed with warnings or skipped"
          fi
